<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1000" height="620" fill="#eef2f7"/>
  <!-- card -->
  <rect x="320" y="100" width="360" height="420" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <!-- brand -->
  <circle cx="500" cy="172" r="26" fill="#3b82f6"/>
  <text x="500" y="180" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">W</text>
  <text x="500" y="248" text-anchor="middle" fill="#111827" font-size="20" font-weight="600">WMP Helper 后台管理系统</text>
  <text x="500" y="276" text-anchor="middle" fill="#6b7280" font-size="13">请登录以继续使用</text>
  <!-- username -->
  <rect x="360" y="312" width="280" height="42" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="376" y="338" fill="#9ca3af" font-size="13">用户名</text>
  <!-- password -->
  <rect x="360" y="366" width="280" height="42" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="376" y="392" fill="#9ca3af" font-size="13">密码</text>
  <!-- button -->
  <rect x="360" y="426" width="280" height="44" rx="8" fill="#3b82f6"/>
  <text x="500" y="454" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">登 录</text>
  <text x="500" y="508" text-anchor="middle" fill="#9ca3af" font-size="12">登录成功后默认进入「仪表盘」</text>
</svg>
